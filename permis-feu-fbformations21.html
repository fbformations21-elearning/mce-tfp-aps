<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Permis de feu — FBFormations21</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a2235;font-size:14px}
.toolbar{background:#1a2235;color:#fff;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.tl{display:flex;align-items:center;gap:12px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.bp{background:#e8530a;color:#fff}.bp:hover{background:#c44508}
.bs{background:#2f3e55;color:#fff}.bs:hover{background:#3d5068}
.bd{background:transparent;border:1px solid #e05c5c;color:#e05c5c}
.pw{max-width:860px;margin:24px auto;padding:0 14px 60px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.ch{padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff}
.cb{padding:16px}
.row{display:grid;gap:12px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}.r4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b}
.inp,.sel,.txt{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:14px;color:#1a2235;background:#fff;transition:.15s;font-family:inherit}
.inp:focus,.sel:focus,.txt:focus{border-color:#e8530a;outline:none;box-shadow:0 0 0 3px rgba(232,83,10,.12)}
.txt{resize:vertical;min-height:65px;line-height:1.6}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-top:4px}
.ci{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:400;cursor:pointer}
.ci input{width:16px;height:16px;accent-color:#e8530a}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.seg button{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#475569;transition:.15s}
.seg button.on{border-color:#e8530a;background:#e8530a;color:#fff}
.warn{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:9px 12px;font-size:13px;margin-top:8px}
.info{background:#e8f4fd;border:1px solid #b6d9f5;border-radius:8px;padding:9px 12px;font-size:13px;margin-top:8px;color:#1a5276}
.pf-card{background:#fff;border-radius:11px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:14px 16px;border-left:4px solid #e8530a;margin-bottom:10px}
.pf-num{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:3px}
.pf-title{font-weight:700;font-size:14px}
.badge{display:inline-flex;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:40px;color:#94a3b8}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.mh{padding:13px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:15px;font-weight:700}
.mb{padding:16px}
.mf{padding:12px 16px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.x{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8}
.st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin:18px 0 8px}
@media print{.toolbar,.no-print{display:none!important}body{background:#fff}.pw{max-width:100%;margin:0;padding:0}.card{box-shadow:none;border:1px solid #ccc;margin-bottom:8px}.ch{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>

<script>
const DB={get:(k,d)=>{try{const v=localStorage.getItem('pffb.'+k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>localStorage.setItem('pffb.'+k,JSON.stringify(v))};
let pfs=DB.get('pfs',[]);function save(){DB.set('pfs',pfs);}
function uid(){return Math.random().toString(36).slice(2,8).toUpperCase();}

const GC={info:"#3b82f6",mineur:"#f59e0b",majeur:"#f97316",critique:"#ef4444"};
let grav="majeur",editId=null;
function v(id){const e=document.getElementById(id);return e?e.value.trim():"";}
function cv(id){const e=document.getElementById(id);return e?e.checked:false;}
function pg(g){grav=g;document.querySelectorAll("#gseg button").forEach(b=>b.classList.toggle("on",b.dataset.g===g));}
function openPf(id){
  editId=id||null;grav="majeur";
  const p=id?pfs.find(x=>x.id===id):null;
  if(p&&p.grav)grav=p.grav;
  const num=p?p.num:("PF-"+String(pfs.length+1).padStart(3,"0"));
  const now=new Date();const td=now.toISOString().slice(0,10);const hr=now.toTimeString().slice(0,5);
  const ck=(k,l)=>`<label class="ci"><input type="checkbox" id="${k}" ${p&&p[k]?"checked":""}> ${l}</label>`;
  const ip=(i,ph,vl)=>`<input class="inp" id="${i}" placeholder="${ph}" value="${vl||""}">`;
  document.getElementById("mTitle").textContent=p?"Modifier — "+p.num:"Nouveau permis de feu";
  document.getElementById("mBody").innerHTML=`

  <div class="field"><label>Entreprise utilisatrice (EU)</label>${ip("peu","Donneur d'ordre",p?p.eu:"")}</div>
  <div class="field"><label>Entreprise intervenante (EI)</label>${ip("pei","Exécutant les travaux",p?p.ei:"")}</div>
</div>
<div class="row r2" style="margin-bottom:12px">
  <div class="field"><label>Responsable EU</label>${ip("peur","Nom",p?p.eur:"")}</div>
  <div class="field"><label>Responsable EI</label>${ip("peir","Nom",p?p.eir:"")}</div>
</div>
<div class="field"><label>Opérateurs autorisés</label><textarea class="txt" id="pops" style="min-height:45px" placeholder="Nom Prénom, Nom Prénom...">${p?p.ops||"":""}</textarea></div>
</div></div>
<div class="st">Nature des travaux</div>
<div class="card" style="box-shadow:none;border:1px solid #e2e8f0"><div class="cb">
<div class="field" style="margin-bottom:12px"><label>Description</label><textarea class="txt" id="pdesc" style="min-height:60px" placeholder="Description précise...">${p?p.desc||"":""}</textarea></div>
<div class="row r2">
  <div class="field"><label>Type de travaux</label><div class="cg">${ck("ts","Soudage")}${ck("tm","Meulage")}${ck("td","Découpage")}${ck("ttr","Tronçonnage")}${ck("tc","Chalumeau")}${ck("ta","Autre")}</div></div>
  <div class="field"><label>Matériels</label><div class="cg">${ck("mp","Poste à souder")}${ck("mc","Chalumeau")}${ck("md","Disqueuse")}${ck("mtr","Tronçonneuse")}${ck("ml","Laser")}${ck("ma","Autre")}</div></div>
</div>
<div class="field" style="margin-top:12px"><label>Niveau de risque</label><div class="seg" id="gseg">
${Object.entries(GV).map(([k,l])=>`<button type="button" data-g="${k}" class="${grav===k?"on":""}" onclick="pg('${k}')">${l}</button>`).join("")}
</div></div>
</div></div>
<div class="st" style="color:#dc2626">Risques particuliers</div>
<div class="card" style="box-shadow:none;border:1px solid #fca5a5"><div class="cb">
<div class="cg">${ck("ra","Zone ATEX")}${ck("rp","Produits inflammables")}${ck("rh","Travaux en hauteur")}${ck("rco","Espace confiné")}${ck("rr","Réseaux / gaines")}${ck("rv","Locaux communicants")}${ck("rn","Travaux de nuit")}${ck("ro","Autre")}</div>
<div class="field" style="margin-top:8px"><label>Précisions</label><textarea class="txt" id="prd" style="min-height:40px" placeholder="Détail...">${p?p.rd||"":""}</textarea></div>
</div></div>
<div class="st" style="color:#e8530a">Mise en sécurité</div>
<div class="card" style="box-shadow:none;border:1px solid #fed7aa"><div class="cb">
<div class="cg">${ck("se","Évacuation combustibles")}${ck("sd","Délimitation zone")}${ck("sp","Protection éléments")}${ck("sk","Consignation énergies")}${ck("sg","Dégazage")}${ck("sc","Colmatage")}${ck("sn","Nettoyage")}${ck("sv","Ventilation")}${ck("sa","Contrôle atmosphère")}${ck("sb","Écrans / bâches")}${ck("sl","Balisage")}${ck("sx","Moyens extinction")}${ck("si","Isolation détection")}${ck("so","Vérif. outillage")}</div>
<div class="row r2" style="margin-top:10px">
  <div class="field"><label>Extincteurs</label>${ip("pext","nb / type",p?p.ext:"")}</div>
  <div class="field"><label>Autres moyens</label>${ip("paex","RIA, lance...",p?p.aex:"")}</div>
</div>
</div></div>
<div class="st">Surveillance</div>
<div class="card" style="box-shadow:none;border:1px solid #e2e8f0"><div class="cb">
<div class="row r2" style="margin-bottom:10px">
  <div class="field"><label>Surveillant pendant travaux</label>${ip("psn","Nom",p?p.sn:"")}</div>
  <div class="field"><label>Après travaux (min. 2h)</label><div style="display:flex;gap:5px;align-items:center;margin-top:4px"><input class="inp" type="time" id="psd" value="${p?p.sd||'':''}}">&nbsp;à&nbsp;<input class="inp" type="time" id="psa" value="${p?p.sa||'':''}"></div></div>
</div>
<div class="field">${ip("pal","Emplacement alerte + contact urgence",p?p.al:"")}</div>
<div class="info">Surveiller minimum <b>2 heures</b> après arrêt des travaux.</div>
</div></div>
<div class="st">Signatures</div>
<div class="card" style="box-shadow:none;border:1px solid #e2e8f0"><div class="cb">
<div class="row r2" style="margin-bottom:10px">
  <div class="field"><label>Chef d'établissement</label>${ip("psc","Nom",p?p.sc:"")}</div>
  <div class="field"><label>Chargé sécurité EU</label>${ip("pss","Nom",p?p.ss:"")}</div>
</div>
<div class="row r2" style="margin-bottom:10px">
  <div class="field"><label>Superviseur EU</label>${ip("psp","Nom",p?p.sp:"")}</div>
  <div class="field"><label>Resp. intervention EI</label>${ip("psi","Nom",p?p.si:"")}</div>
</div>
<div class="field"><label>Observations</label><textarea class="txt" id="pobs" style="min-height:40px" placeholder="Conditions particulières...">${p?p.obs||"":""}</textarea></div>
</div></div>`;

function closeM(){document.getElementById("ov").classList.remove("show");}
function savePf(print){
  const id=editId;
  const p={id:id||uid(),num:v("pnum"),dd:v("pdd"),df:v("pdf"),hd:v("phd"),hf:v("phf"),lieu:v("plieu"),eu:v("peu"),ei:v("pei"),eur:v("peur"),eir:v("peir"),ops:v("pops"),desc:v("pdesc"),grav,rd:v("prd"),ext:v("pext"),aex:v("paex"),sn:v("psn"),sd:v("psd"),sa:v("psa"),al:v("pal"),sc:v("psc"),ss:v("pss"),sp:v("psp"),si:v("psi"),obs:v("pobs"),created:id?(pfs.find(x=>x.id===id)||{}).created||Date.now():Date.now()};
  ["ts","tm","td","ttr","tc","ta","mp","mc","md","mtr","ml","ma","ra","rp","rh","rco","rr","rv","rn","ro","se","sd","sp","sk","sg","sc","sn","sv","sa","sb","sl","sx","si","so"].forEach(k=>p[k]=cv(k));
  if(id){const i=pfs.findIndex(x=>x.id===id);if(i>=0)pfs[i]=p;else pfs.push(p);}else pfs.push(p);
  save();closeM();renderList();
  if(print)setTimeout(()=>printPf(p.id),300);
}
function delPf(id){if(!confirm("Supprimer ?"))return;pfs=pfs.filter(x=>x.id!==id);save();renderList();}
function renderList(){
  const el=document.getElementById("listPf");
  if(!pfs.length){el.innerHTML='<div class="empty">Aucun permis — cliquez sur <b>Nouveau permis</b></div>';return;}
  el.innerHTML=[...pfs].reverse().map(p=>{
    const gc=GC[p.grav]||"#64748b";const gl=GV[p.grav]||"—";
    return `<div class="pf-card"><div class="pf-num">${p.num} · ${p.dd||"—"} ${p.hd||""} → ${p.hf||""}</div>
    <div class="pf-title">${p.lieu||"(lieu non renseigné)"}</div>
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
      <span class="badge" style="background:${gc}20;color:${gc}">${gl}</span>
      <span style="font-size:12px;color:#64748b">EU: ${p.eur||"—"} / EI: ${p.eir||"—"}</span>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bs" style="padding:5px 11px;font-size:12px" onclick="openPf('${p.id}')">Modifier</button>
      <button class="btn bs" style="padding:5px 11px;font-size:12px" onclick="printPf('${p.id}')">Imprimer</button>
      <button class="btn bd" style="padding:5px 11px;font-size:12px" onclick="delPf('${p.id}')">Supprimer</button>
    </div></div>`;
  }).join("");
}
