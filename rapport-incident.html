<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rapport sur Site — FBFormations21</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a2235;min-height:100vh}

/* ===== TOOLBAR ===== */
.toolbar{background:#1a2235;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;justify-content:space-between;print:none}
.toolbar h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.toolbar-actions{display:flex;gap:10px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn-primary{background:#e8530a;color:#fff}
.btn-primary:hover{background:#c44508}
.btn-secondary{background:#2f3e55;color:#fff}
.btn-secondary:hover{background:#3d5068}
.btn-danger{background:transparent;border:1px solid #e05c5c;color:#e05c5c}
.btn-danger:hover{background:#e05c5c22}

/* ===== PAGE ===== */
.page-wrap{max-width:820px;margin:32px auto;padding:0 16px 60px}

/* ===== CARD ===== */
.card{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden}
.card-head{background:#1a2235;color:#fff;padding:14px 20px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:8px}
.card-head svg{opacity:.7}
.card-body{padding:20px}

/* ===== FORM ===== */
.row{display:grid;gap:14px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b}
.inp,.sel,.txt{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13.5px;color:#1a2235;background:#fff;transition:.15s;font-family:inherit}
.inp:focus,.sel:focus,.txt:focus{border-color:#e8530a;outline:none;box-shadow:0 0 0 3px rgba(232,83,10,.12)}
.txt{resize:vertical;min-height:140px;line-height:1.6}
.txt-lg{min-height:220px}

/* ===== CHIP TYPE ===== */
.type-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.type-chip{padding:7px 14px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;color:#475569}
.type-chip:hover{border-color:#cbd5e1}
.type-chip.on{border-color:var(--c);background:var(--c);color:#fff}

/* ===== GRAVITE ===== */
.grav-grid{display:flex;gap:8px;flex-wrap:wrap}
.grav-chip{padding:7px 18px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;color:#475569}
.grav-chip.on[data-g="info"]{background:#3b82f6;border-color:#3b82f6;color:#fff}
.grav-chip.on[data-g="mineur"]{background:#f59e0b;border-color:#f59e0b;color:#fff}
.grav-chip.on[data-g="majeur"]{background:#f97316;border-color:#f97316;color:#fff}
.grav-chip.on[data-g="critique"]{background:#ef4444;border-color:#ef4444;color:#fff}

/* ===== SÉPARATEUR ===== */
.sep{border:none;border-top:1.5px solid #f1f5f9;margin:16px 0}

/* ===== SIGNATURE ===== */
.sig-box{border:1.5px dashed #cbd5e1;border-radius:10px;height:100px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;margin-top:6px;position:relative;overflow:hidden}
#sigCanvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair}
.sig-clear{position:absolute;top:6px;right:8px;font-size:11px;color:#94a3b8;cursor:pointer;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:2px 8px;z-index:2}

/* ===== RAPPORT LISTE ===== */
.rapport-item{border:1.5px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.rapport-item-info{flex:1;min-width:0}
.rapport-ref{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:3px}
.rapport-title{font-weight:700;font-size:13.5px;color:#1a2235}
.rapport-meta{font-size:12px;color:#64748b;margin-top:3px}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}

/* ===== PRINT ===== */
@media print{
  .toolbar,.no-print{display:none!important}
  body{background:#fff}
  .page-wrap{max-width:100%;margin:0;padding:0}
  .card{box-shadow:none;border:1px solid #ddd;margin-bottom:12px}
  .card-head{background:#1a2235!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ===== MODAL ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal-head{padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px}
.x{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:40px 20px;color:#94a3b8}
.empty svg{margin-bottom:12px;opacity:.4}
</style>
</head>
<body>

<div class="toolbar no-print">
  <h1>Rapport sur Site — FBFormations21</h1>
  <div class="toolbar-actions">
    <button class="btn btn-secondary" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
      Imprimer / PDF
    </button>
    <button class="btn btn-primary" onclick="openRapport()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Nouveau rapport
    </button>
  </div>
</div>

<div class="page-wrap">

  <!-- Liste des rapports -->
  <div class="card">
    <div class="card-head">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      Rapports enregistrés
    </div>
    <div class="card-body" id="listRapports">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        <div>Aucun rapport enregistré — cliquez sur <b>Nouveau rapport</b></div>
      </div>
    </div>
  </div>

</div>

<!-- ===== MODAL RAPPORT ===== -->
<div class="overlay" id="overlay">
<div class="modal" id="modal">
  <div class="modal-head">
    <h3 id="modalTitle">Nouveau rapport</h3>
    <button class="x" onclick="closeModal()">×</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="r_id">

    <!-- Identification -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Identification</div>
      <div class="card-body">
        <div class="row row-3" style="margin-bottom:14px">
          <div class="field">
            <label>Date</label>
            <input class="inp" type="date" id="r_date">
          </div>
          <div class="field">
            <label>Heure</label>
            <input class="inp" type="time" id="r_heure">
          </div>
          <div class="field">
            <label>N° Rapport</label>
            <input class="inp" type="text" id="r_num" placeholder="Auto" readonly style="background:#f8fafc;color:#94a3b8">
          </div>
        </div>
        <div class="row row-2">
          <div class="field">
            <label>Site / Établissement</label>
            <input class="inp" type="text" id="r_site" placeholder="Nom du site">
          </div>
          <div class="field">
            <label>Localisation précise</label>
            <input class="inp" type="text" id="r_loc" placeholder="Bâtiment, niveau, zone...">
          </div>
        </div>
      </div>
    </div>

    <!-- Type d'incident -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Type d'incident</div>
      <div class="card-body">
        <div class="type-grid" id="typeGrid">
          <button class="type-chip" style="--c:#ef4444" data-t="intrusion" onclick="pickType(this)">Intrusion</button>
          <button class="type-chip" style="--c:#f97316" data-t="incendie" onclick="pickType(this)">Incendie / Fumée</button>
          <button class="type-chip" style="--c:#e8912d" data-t="technique" onclick="pickType(this)">Panne technique</button>
          <button class="type-chip" style="--c:#0ea5a5" data-t="acces" onclick="pickType(this)">Contrôle d'accès</button>
          <button class="type-chip" style="--c:#2f9e6b" data-t="secours" onclick="pickType(this)">Secours / Malaise</button>
          <button class="type-chip" style="--c:#a855f7" data-t="degats" onclick="pickType(this)">Dégâts matériels</button>
          <button class="type-chip" style="--c:#6366f1" data-t="comportement" onclick="pickType(this)">Comportement suspect</button>
          <button class="type-chip" style="--c:#64748b" data-t="autre" onclick="pickType(this)">Autre</button>
        </div>
        <div class="field" style="margin-top:12px">
          <label>Préciser si "Autre"</label>
          <input class="inp" type="text" id="r_type_autre" placeholder="Type d'incident non listé...">
        </div>
      </div>
    </div>

    <!-- Gravité -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Gravité</div>
      <div class="card-body">
        <div class="grav-grid">
          <button class="grav-chip" data-g="info" onclick="pickGrav(this)">Information</button>
          <button class="grav-chip" data-g="mineur" onclick="pickGrav(this)">Mineur</button>
          <button class="grav-chip on" data-g="majeur" onclick="pickGrav(this)">Majeur</button>
          <button class="grav-chip" data-g="critique" onclick="pickGrav(this)">Critique</button>
        </div>
      </div>
    </div>

    <!-- Personnes impliquées -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Personnes impliquées</div>
      <div class="card-body">
        <div class="row row-2" style="margin-bottom:12px">
          <div class="field">
            <label>Nb de personnes impliquées</label>
            <input class="inp" type="number" id="r_nb_pers" min="0" value="0">
          </div>
          <div class="field">
            <label>Nb de blessés</label>
            <input class="inp" type="number" id="r_nb_blesses" min="0" value="0">
          </div>
        </div>
        <div class="field">
          <label>Identité(s) / Description(s)</label>
          <textarea class="txt" id="r_personnes" placeholder="Nom, prénom, qualité, description physique..." style="min-height:70px"></textarea>
        </div>
      </div>
    </div>

    <!-- Description des faits -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Description des faits</div>
      <div class="card-body">
        <div class="field" style="margin-bottom:14px">
          <label>Circonstances — que s'est-il passé ?</label>
          <textarea class="txt txt-lg" id="r_faits" placeholder="Décrire chronologiquement les faits constatés : heure de constatation, déroulement, éléments observés..."></textarea>
        </div>
        <div class="field">
          <label>Mesures prises immédiatement</label>
          <textarea class="txt" id="r_mesures" placeholder="Actions menées : appel secours, évacuation, confinement, interpellation, contact hiérarchie..."></textarea>
        </div>
      </div>
    </div>

    <!-- Moyens engagés -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Moyens engagés</div>
      <div class="card-body">
        <div class="row row-2" style="margin-bottom:12px">
          <div class="field">
            <label>Services alertés</label>
            <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
              <label style="text-transform:none;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="r_samu"> SAMU (15)</label>
              <label style="text-transform:none;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="r_police"> Police / Gendarmerie (17)</label>
              <label style="text-transform:none;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="r_pompiers"> Pompiers (18)</label>
              <label style="text-transform:none;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="r_hier"> Hiérarchie / Direction</label>
            </div>
          </div>
          <div class="field">
            <label>Heure d'arrivée des secours</label>
            <input class="inp" type="time" id="r_heure_secours" style="margin-top:4px">
            <label style="margin-top:10px">Référence d'intervention (si connue)</label>
            <input class="inp" type="text" id="r_ref_inter" placeholder="N° PV, main courante...">
          </div>
        </div>
        <div class="field">
          <label>Autres moyens / observations</label>
          <textarea class="txt" id="r_moyens" placeholder="Vidéosurveillance activée, agent supplémentaire appelé, périmètre de sécurité mis en place..." style="min-height:70px"></textarea>
        </div>
      </div>
    </div>

    <!-- Suite donnée -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Suite donnée</div>
      <div class="card-body">
        <div class="field" style="margin-bottom:12px">
          <label>Suite donnée à l'incident</label>
          <select class="sel" id="r_suite">
            <option value="">-- Sélectionner --</option>
            <option>Classé sans suite</option>
            <option>Dépôt de plainte</option>
            <option>Main courante police</option>
            <option>Signalement hiérarchique</option>
            <option>Rapport transmis à la direction</option>
            <option>Ouverture d'enquête interne</option>
            <option>Hospitalisation</option>
            <option>En cours de traitement</option>
          </select>
        </div>
        <div class="field">
          <label>Observations complémentaires</label>
          <textarea class="txt" id="r_obs" placeholder="Préconisations, points d'amélioration, suivi nécessaire..." style="min-height:80px"></textarea>
        </div>
      </div>
    </div>

    <!-- Rédacteur -->
    <div class="card" style="box-shadow:none;border:1px solid #e2e8f0;margin-top:14px">
      <div class="card-head" style="font-size:11px;padding:10px 16px">Rédacteur du rapport</div>
      <div class="card-body">
        <div class="row row-2" style="margin-bottom:14px">
          <div class="field">
            <label>Nom et Prénom</label>
            <input class="inp" type="text" id="r_nom" placeholder="NOM Prénom">
          </div>
          <div class="field">
            <label>Fonction / Qualification</label>
            <select class="sel" id="r_fonction">
              <option value="">-- Sélectionner --</option>
              <option>Agent de sécurité</option>
              <option>Agent de sûreté</option>
              <option>Chef de poste</option>
              <option>Responsable de site</option>
              <option>Rondier</option>
              <option>Agent SSIAP 1</option>
              <option>Chef d'équipe SSIAP 2</option>
              <option>Chef de service SSIAP 3</option>
              <option>ADS (Agent de Défense et Sécurité)</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Signature</label>
          <div class="sig-box">
            <span id="sigPlaceholder" style="pointer-events:none">Signer ici</span>
            <canvas id="sigCanvas"></canvas>
            <button class="sig-clear no-print" onclick="clearSig()">Effacer</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- modal-body -->
  <div class="modal-foot">
    <button class="btn btn-danger" onclick="closeModal()">Annuler</button>
    <button class="btn btn-secondary" onclick="saveRapport(false)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      Enregistrer
    </button>
    <button class="btn btn-primary" onclick="saveRapport(true)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
      Enregistrer et imprimer
    </button>
  </div>
</div>
</div>

<script>
// ===== STORAGE =====
const DB={get:(k,d)=>{try{const v=localStorage.getItem('rsi.'+k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>localStorage.setItem('rsi.'+k,JSON.stringify(v))};
let rapports=DB.get('rapports',[]);
function save(){DB.set('rapports',rapports);}
function uid(){return Math.random().toString(36).slice(2,8).toUpperCase();}

// ===== TYPES / GRAVITES =====
const TYPE_LABELS={intrusion:'Intrusion',incendie:'Incendie / Fumée',technique:'Panne technique',acces:"Contrôle d'accès",secours:'Secours / Malaise',degats:'Dégâts matériels',comportement:'Comportement suspect',autre:'Autre'};
const TYPE_COLORS={intrusion:'#ef4444',incendie:'#f97316',technique:'#e8912d',acces:'#0ea5a5',secours:'#2f9e6b',degats:'#a855f7',comportement:'#6366f1',autre:'#64748b'};
const GRAV_LABELS={info:'Information',mineur:'Mineur',majeur:'Majeur',critique:'Critique'};
const GRAV_COLORS={info:'#3b82f6',mineur:'#f59e0b',majeur:'#f97316',critique:'#ef4444'};

let selType=null,selGrav='majeur';

function pickType(btn){
  selType=btn.dataset.t;
  document.querySelectorAll('.type-chip').forEach(b=>b.classList.toggle('on',b===btn));
}
function pickGrav(btn){
  selGrav=btn.dataset.g;
  document.querySelectorAll('.grav-chip').forEach(b=>b.classList.toggle('on',b===btn));
}

// ===== SIGNATURE =====
let sigDrawing=false,sigCtx=null;
function initSig(){
  const c=document.getElementById('sigCanvas');
  if(!c)return;
  const box=c.parentElement;
  c.width=box.offsetWidth;c.height=box.offsetHeight;
  sigCtx=c.getContext('2d');
  sigCtx.strokeStyle='#1a2235';sigCtx.lineWidth=2;sigCtx.lineCap='round';
  c.onmousedown=e=>{sigDrawing=true;const r=c.getBoundingClientRect();sigCtx.beginPath();sigCtx.moveTo(e.clientX-r.left,e.clientY-r.top);document.getElementById('sigPlaceholder').style.display='none';};
  c.onmousemove=e=>{if(!sigDrawing)return;const r=c.getBoundingClientRect();sigCtx.lineTo(e.clientX-r.left,e.clientY-r.top);sigCtx.stroke();};
  c.onmouseup=c.onmouseleave=()=>sigDrawing=false;
  c.ontouchstart=e=>{e.preventDefault();const t=e.touches[0];const r=c.getBoundingClientRect();sigDrawing=true;sigCtx.beginPath();sigCtx.moveTo(t.clientX-r.left,t.clientY-r.top);document.getElementById('sigPlaceholder').style.display='none';};
  c.ontouchmove=e=>{e.preventDefault();if(!sigDrawing)return;const t=e.touches[0];const r=c.getBoundingClientRect();sigCtx.lineTo(t.clientX-r.left,t.clientY-r.top);sigCtx.stroke();};
  c.ontouchend=()=>sigDrawing=false;
}
function clearSig(){if(sigCtx){sigCtx.clearRect(0,0,sigCtx.canvas.width,sigCtx.canvas.height);document.getElementById('sigPlaceholder').style.display='';}}
function getSigData(){const c=document.getElementById('sigCanvas');if(!c)return null;const blank=document.createElement('canvas');blank.width=c.width;blank.height=c.height;return c.toDataURL()===blank.toDataURL()?null:c.toDataURL();}

// ===== MODAL =====
function openRapport(id){
  const ov=document.getElementById('overlay');
  // Reset
  selType=null;selGrav='majeur';
  document.querySelectorAll('.type-chip').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.grav-chip').forEach(b=>b.classList.toggle('on',b.dataset.g==='majeur'));
  ['r_id','r_date','r_heure','r_num','r_site','r_loc','r_type_autre','r_nb_pers','r_nb_blesses','r_personnes','r_faits','r_mesures','r_moyens','r_suite','r_obs','r_nom','r_ref_inter','r_heure_secours'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  ['r_samu','r_police','r_pompiers','r_hier'].forEach(f=>{const el=document.getElementById(f);if(el)el.checked=false;});
  document.getElementById('r_nb_pers').value='0';
  document.getElementById('r_nb_blesses').value='0';
  document.getElementById('r_date').value=new Date().toISOString().slice(0,10);
  document.getElementById('r_heure').value=new Date().toTimeString().slice(0,5);

  if(id){
    const r=rapports.find(x=>x.id===id);
    if(r){
      document.getElementById('modalTitle').textContent='Modifier le rapport '+r.num;
      document.getElementById('r_id').value=r.id;
      document.getElementById('r_num').value=r.num;
      document.getElementById('r_date').value=r.date||'';
      document.getElementById('r_heure').value=r.heure||'';
      document.getElementById('r_site').value=r.site||'';
      document.getElementById('r_loc').value=r.loc||'';
      document.getElementById('r_type_autre').value=r.type_autre||'';
      document.getElementById('r_nb_pers').value=r.nb_pers||'0';
      document.getElementById('r_nb_blesses').value=r.nb_blesses||'0';
      document.getElementById('r_personnes').value=r.personnes||'';
      document.getElementById('r_faits').value=r.faits||'';
      document.getElementById('r_mesures').value=r.mesures||'';
      document.getElementById('r_moyens').value=r.moyens||'';
      document.getElementById('r_suite').value=r.suite||'';
      document.getElementById('r_obs').value=r.obs||'';
      document.getElementById('r_nom').value=r.nom||'';
      document.getElementById('r_heure_secours').value=r.heure_secours||'';
      document.getElementById('r_ref_inter').value=r.ref_inter||'';
      ['samu','police','pompiers','hier'].forEach(k=>{const el=document.getElementById('r_'+k);if(el)el.checked=r['s_'+k]||false;});
      if(r.type){selType=r.type;document.querySelectorAll('.type-chip').forEach(b=>b.classList.toggle('on',b.dataset.t===r.type));}
      if(r.gravite){selGrav=r.gravite;document.querySelectorAll('.grav-chip').forEach(b=>b.classList.toggle('on',b.dataset.g===r.gravite));}
      if(r.fonction)document.getElementById('r_fonction').value=r.fonction;
    }
  }else{
    document.getElementById('modalTitle').textContent='Nouveau rapport';
    document.getElementById('r_num').value='RSI-'+Date.now().toString(36).slice(-4).toUpperCase();
  }
  ov.classList.add('show');
  setTimeout(initSig,100);
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}

// ===== SAVE =====
function saveRapport(print){
  const id=document.getElementById('r_id').value;
  const r={
    id:id||uid(),
    num:document.getElementById('r_num').value,
    created:id?(rapports.find(x=>x.id===id)||{}).created||Date.now():Date.now(),
    date:document.getElementById('r_date').value,
    heure:document.getElementById('r_heure').value,
    site:document.getElementById('r_site').value,
    loc:document.getElementById('r_loc').value,
    type:selType,gravite:selGrav,
    type_autre:document.getElementById('r_type_autre').value,
    nb_pers:document.getElementById('r_nb_pers').value,
    nb_blesses:document.getElementById('r_nb_blesses').value,
    personnes:document.getElementById('r_personnes').value,
    faits:document.getElementById('r_faits').value,
    mesures:document.getElementById('r_mesures').value,
    moyens:document.getElementById('r_moyens').value,
    suite:document.getElementById('r_suite').value,
    obs:document.getElementById('r_obs').value,
    nom:document.getElementById('r_nom').value,
    fonction:document.getElementById('r_fonction').value,
    heure_secours:document.getElementById('r_heure_secours').value,
    ref_inter:document.getElementById('r_ref_inter').value,
    s_samu:document.getElementById('r_samu').checked,
    s_police:document.getElementById('r_police').checked,
    s_pompiers:document.getElementById('r_pompiers').checked,
    s_hier:document.getElementById('r_hier').checked,
    sig:getSigData()
  };
  if(id){const i=rapports.findIndex(x=>x.id===id);if(i>=0)rapports[i]=r;else rapports.push(r);}
  else rapports.push(r);
  save();closeModal();renderList();
  if(print)setTimeout(()=>printRapport(r.id),300);
}

// ===== PRINT RAPPORT =====
function printRapport(id){
  const r=rapports.find(x=>x.id===id);if(!r)return;
  const services=[];
  if(r.s_samu)services.push('SAMU (15)');if(r.s_police)services.push('Police/Gendarmerie (17)');
  if(r.s_pompiers)services.push('Pompiers (18)');if(r.s_hier)services.push('Hiérarchie/Direction');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Rapport ${r.num}</title><style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#000;padding:20px}
    h1{font-size:18px;font-weight:900;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
    .sub{text-align:center;font-size:11px;color:#555;margin-bottom:20px}
    .section{border:1px solid #999;border-radius:4px;margin-bottom:10px;overflow:hidden}
    .section-head{background:#1a2235;color:#fff;padding:6px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .section-body{padding:10px 12px}
    .row{display:flex;gap:16px;margin-bottom:6px}
    .field{flex:1}.field label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700}
    .field .val{border-bottom:1px solid #ccc;min-height:20px;padding:2px 0;font-size:12px}
    .text-block{border:1px solid #ccc;border-radius:3px;min-height:${r.faits?Math.max(80,r.faits.length/2)+'px':'120px'};padding:6px 8px;font-size:12px;white-space:pre-wrap;line-height:1.6}
    .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;background:${r.type?TYPE_COLORS[r.type]:'#64748b'}}
    .grav{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;background:${GRAV_COLORS[r.gravite]||'#64748b'}}
    .sig-img{max-height:70px;border:1px solid #eee;border-radius:4px}
    .footer{text-align:center;font-size:9px;color:#999;margin-top:16px;border-top:1px solid #eee;padding-top:8px}
    @media print{body{padding:10px}}
  </style></head><body>
  <h1>Rapport sur Site</h1>
  <div class="sub">FBFormations21 — MCE</div>
  <div class="section"><div class="section-head">Identification</div><div class="section-body">
    <div class="row">
      <div class="field"><label>N° Rapport</label><div class="val">${r.num}</div></div>
      <div class="field"><label>Date</label><div class="val">${r.date||'—'}</div></div>
      <div class="field"><label>Heure</label><div class="val">${r.heure||'—'}</div></div>
    </div>
    <div class="row">
      <div class="field"><label>Site</label><div class="val">${r.site||'—'}</div></div>
      <div class="field"><label>Localisation</label><div class="val">${r.loc||'—'}</div></div>
    </div>
    <div class="row" style="margin-top:6px">
      <div class="field"><label>Type</label><span class="badge">${r.type?TYPE_LABELS[r.type]:r.type_autre||'—'}</span></div>
      <div class="field"><label>Gravité</label><span class="grav">${GRAV_LABELS[r.gravite]||'—'}</span></div>
    </div>
  </div></div>
  <div class="section"><div class="section-head">Description des faits</div><div class="section-body">
    <div style="margin-bottom:8px"><label style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700">Circonstances</label>
    <div class="text-block">${r.faits||''}</div></div>
    <div><label style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700">Mesures prises</label>
    <div class="text-block" style="min-height:60px">${r.mesures||''}</div></div>
  </div></div>
  ${(r.nb_pers>0||r.nb_blesses>0||r.personnes)?`<div class="section"><div class="section-head">Personnes impliquées</div><div class="section-body">
    <div class="row"><div class="field"><label>Nb personnes</label><div class="val">${r.nb_pers||0}</div></div>
    <div class="field"><label>Nb blessés</label><div class="val">${r.nb_blesses||0}</div></div></div>
    ${r.personnes?`<div><label style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700">Identité(s)</label><div class="text-block" style="min-height:40px">${r.personnes}</div></div>`:''}
  </div></div>`:''}
  <div class="section"><div class="section-head">Moyens engagés</div><div class="section-body">
    <div class="row">
      <div class="field"><label>Services alertés</label><div class="val">${services.length?services.join(', '):'Aucun'}</div></div>
      ${r.heure_secours?`<div class="field"><label>Arrivée secours</label><div class="val">${r.heure_secours}</div></div>`:''}
    </div>
    ${r.moyens?`<div style="margin-top:6px"><label style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700">Observations</label><div class="text-block" style="min-height:40px">${r.moyens}</div></div>`:''}
  </div></div>
  <div class="section"><div class="section-head">Suite donnée</div><div class="section-body">
    ${r.suite?`<div class="row"><div class="field"><label>Suite</label><div class="val">${r.suite}</div></div></div>`:''}
    ${r.obs?`<div style="margin-top:6px"><div class="text-block" style="min-height:50px">${r.obs}</div></div>`:''}
  </div></div>
  <div class="section"><div class="section-head">Rédacteur</div><div class="section-body">
    <div class="row">
      <div class="field"><label>Nom et Prénom</label><div class="val">${r.nom||'—'}</div></div>
      <div class="field"><label>Fonction</label><div class="val">${r.fonction||'—'}</div></div>
    </div>
    <div style="margin-top:10px"><label style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#666;font-weight:700">Signature</label>
    ${r.sig?`<div><img src="${r.sig}" class="sig-img"></div>`:`<div style="border-bottom:1px solid #ccc;height:50px"></div>`}
    </div>
  </div></div>
  <div class="footer">Document généré le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} — FBFormations21 · MCE</div>
  <script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
}

// ===== SUPPRIMER =====
function deleteRapport(id){
  if(!confirm('Supprimer ce rapport ?'))return;
  rapports=rapports.filter(x=>x.id!==id);save();renderList();
}

// ===== RENDER LIST =====
function renderList(){
  const el=document.getElementById('listRapports');
  if(!rapports.length){
    el.innerHTML=`<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg><div>Aucun rapport — cliquez sur <b>Nouveau rapport</b></div></div>`;return;
  }
  el.innerHTML=[...rapports].reverse().map(r=>{
    const tl=r.type?TYPE_LABELS[r.type]:r.type_autre||'—';
    const tc=r.type?TYPE_COLORS[r.type]:'#64748b';
    const gc=GRAV_COLORS[r.gravite]||'#64748b';
    return `<div class="rapport-item">
      <div class="rapport-item-info">
        <div class="rapport-ref">${r.num} · ${r.date||'—'} ${r.heure||''}</div>
        <div class="rapport-title">${r.site||'(site non renseigné)'}</div>
        <div class="rapport-meta" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
          <span class="badge" style="background:${tc}22;color:${tc}">${tl}</span>
          <span class="badge" style="background:${gc}22;color:${gc}">${GRAV_LABELS[r.gravite]||'—'}</span>
          ${r.nom?`<span style="font-size:12px;color:#64748b">Par ${r.nom}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex:none">
        <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px" onclick="openRapport('${r.id}')">Modifier</button>
        <button class="btn btn-secondary" style="padding:6px 12px;font-size:12px" onclick="printRapport('${r.id}')">Imprimer</button>
        <button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteRapport('${r.id}')">×</button>
      </div>
    </div>`;
  }).join('');
}

// ===== INIT =====
renderList();
</script>
</body>
</html>
